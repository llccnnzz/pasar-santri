services:
  postgres:
    image: postgres:16-alpine
    container_name: pasar_santri_db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pasar_santri
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pasar_santri_redis
    restart: unless-stopped
    ports:
      - "6382:6379"

volumes:
  pgdata:
    driver: local
